<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Stats - Lucro Real</title>
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #34495e;
            --bg: #f4f7f6;
            --text: #2c3e50;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 70px;
        }

        header {
            background-color: var(--secondary);
            color: var(--white);
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            padding: 15px;
            max-width: 500px;
            margin: auto;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h3 { margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 8px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: bold; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            background: #fafafa;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save { background-color: var(--primary); color: white; }
        .btn-save:active { transform: scale(0.98); opacity: 0.9; }

        /* Navegação Inferior */
        .nav-tabs {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--white);
            display: flex;
            border-top: 1px solid #ddd;
            height: 60px;
        }

        .tab-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 0.8rem;
            color: #7f8c8d;
            cursor: pointer;
        }

        .tab-item.active { color: var(--primary); font-weight: bold; }

        /* Tela de Gráficos/Resumo */
        .hidden { display: none; }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .val { font-weight: bold; color: var(--primary); }
        .negative { color: #e74c3c; }
    </style>
</head>
<body>

<header>
    <h2 id="page-title">Lançamento de Turno</h2>
</header>

<div class="container">
    <div id="tab-launch">
        <div class="card">
            <h3>Rodagem & Custo</h3>
            <div class="input-group">
                <label>KM Rodados</label>
                <input type="number" id="km_rodados" placeholder="Ex: 150">
            </div>
            <div class="input-group">
                <label>Média (KM/L)</label>
                <input type="number" id="km_litro" placeholder="Ex: 12.5">
            </div>
            <div class="input-group">
                <label>Preço Gasolina (R$)</label>
                <input type="number" id="preco_gas" step="0.01" placeholder="Ex: 5.89">
            </div>
        </div>

        <div class="card">
            <h3>Ganhos por Plataforma</h3>
            <div class="input-group"><label>Uber</label><input type="number" id="ganho_uber" step="0.01"></div>
            <div class="input-group"><label>99</label><input type="number" id="ganho_99" step="0.01"></div>
            <div class="input-group"><label>Shopee</label><input type="number" id="ganho_shopee" step="0.01"></div>
            <div class="input-group"><label>Particular</label><input type="number" id="ganho_part" step="0.01"></div>
        </div>

        <button class="btn-save" onclick="salvarTurno()">Salvar e Calcular</button>
    </div>

    <div id="tab-stats" class="hidden">
        <div class="card">
            <h3>Último Resultado</h3>
            <div id="resumo-container">
                <p style="text-align:center; color:#999;">Nenhum dado salvo hoje.</p>
            </div>
        </div>
        
        <div class="card" id="historico">
            <h3>Métricas de Eficiência</h3>
            <div id="metricas-corpo"></div>
        </div>
    </div>
</div>

<nav class="nav-tabs">
    <div class="tab-item active" onclick="switchTab('launch')">
        <span>📝 Lançar</span>
    </div>
    <div class="tab-item" onclick="switchTab('stats')">
        <span>📊 Gráficos</span>
    </div>
</nav>

<script>
    function switchTab(tab) {
        const tLaunch = document.getElementById('tab-launch');
        const tStats = document.getElementById('tab-stats');
        const title = document.getElementById('page-title');
        const items = document.querySelectorAll('.tab-item');

        if(tab === 'launch') {
            tLaunch.classList.remove('hidden');
            tStats.classList.add('hidden');
            title.innerText = 'Lançamento de Turno';
            items[0].classList.add('active');
            items[1].classList.remove('active');
        } else {
            tLaunch.classList.add('hidden');
            tStats.classList.remove('hidden');
            title.innerText = 'Performance';
            items[1].classList.add('active');
            items[0].classList.remove('active');
            mostrarResultados();
        }
    }

    function salvarTurno() {
        const dados = {
            km: parseFloat(document.getElementById('km_rodados').value) || 0,
            consumo: parseFloat(document.getElementById('km_litro').value) || 0,
            gas: parseFloat(document.getElementById('preco_gas').value) || 0,
            uber: parseFloat(document.getElementById('ganho_uber').value) || 0,
            99: parseFloat(document.getElementById('ganho_99').value) || 0,
            shopee: parseFloat(document.getElementById('ganho_shopee').value) || 0,
            particular: parseFloat(document.getElementById('ganho_part').value) || 0,
            data: new Date().toLocaleDateString('pt-BR')
        };

        if(dados.km === 0) {
            alert("Por favor, insira a quilometragem.");
            return;
        }

        // Cálculos
        const custoCombustivel = (dados.km / dados.consumo) * dados.gas;
        const ganhoBruto = dados.uber + dados['99'] + dados.shopee + dados.particular;
        const lucroLiquido = ganhoBruto - custoCombustivel;
        const ganhoPorKm = ganhoBruto / dados.km;
        const custoPorKm = custoCombustivel / dados.km;

        const resultadoFinal = {
            ...dados,
            custoTotal: custoCombustivel,
            bruto: ganhoBruto,
            liquido: lucroLiquido,
            rKm: ganhoPorKm,
            cKm: custoPorKm
        };

        localStorage.setItem('ultimo_turno', JSON.stringify(resultadoFinal));
        alert("Turno salvo com sucesso!");
        switchTab('stats');
    }

    function mostrarResultados() {
        const raw = localStorage.getItem('ultimo_turno');
        const container = document.getElementById('resumo-container');
        const metricas = document.getElementById('metricas-corpo');

        if(!raw) return;
        const res = JSON.parse(raw);

        container.innerHTML = `
            <div class="stat-row"><span>Ganho Bruto:</span><span class="val">R$ ${res.bruto.toFixed(2)}</span></div>
            <div class="stat-row"><span>Custo Combustível:</span><span class="val negative">- R$ ${res.custoTotal.toFixed(2)}</span></div>
            <div class="stat-row"><span>Lucro Real:</span><span class="val" style="font-size:1.2rem">R$ ${res.liquido.toFixed(2)}</span></div>
        `;

        metricas.innerHTML = `
            <div class="stat-row"><span>R$ por KM rodado:</span><span class="val">R$ ${res.rKm.toFixed(2)}</span></div>
            <div class="stat-row"><span>Custo por KM:</span><span class="val negative">R$ ${res.cKm.toFixed(2)}</span></div>
            <div class="stat-row"><span>Eficiência Líquida:</span><span class="val">R$ ${(res.rKm - res.cKm).toFixed(2)}/km</span></div>
        `;
    }
</script>

</body>
</html>
